services:
  - type: web
    name: gram-scs
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 3 --threads 2 --worker-class gthread --bind 0.0.0.0:$PORT run:app
    healthCheckPath: /health/db
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: gramscs
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: DB_POOL_PRE_PING
        value: "true"
      - key: DB_POOL_RECYCLE
        value: "180"
      - key: DB_POOL_SIZE
        value: "3"
      - key: DB_MAX_OVERFLOW
        value: "2"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_CONNECT_TIMEOUT
        value: "10"
      - key: LOG_LEVEL
        value: INFO
      # Set DATABASE_URL and MASTER_DATABASE_URL in Render using the Supabase
      # pooler URLs from .env.render.example. Both must point at the same
      # Supabase database unless you intentionally use a separate master DB.
    autoDeploy: true
