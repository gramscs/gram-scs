services:
  - type: web
    name: gram-scs
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 3 --threads 2 --worker-class gthread --bind 0.0.0.0:10000 run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: true
