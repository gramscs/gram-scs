services:
  - type: web
    name: gram-scs
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 3 --threads 2 --worker-class gthread --bind 0.0.0.0:10000 run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_ENV
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: DB_POOL_PRE_PING
        value: "true"
      - key: DB_POOL_RECYCLE
        value: "180"
      - key: DB_POOL_SIZE
        value: "3"
      - key: DB_MAX_OVERFLOW
        value: "2"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_CONNECT_TIMEOUT
        value: "10"
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: true
