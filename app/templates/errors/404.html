{% extends "layouts/base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container" style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div class="text-center">
        <h1 class="display-1 fw-bold mb-4">404</h1>
        <h2 class="mb-4">Page Not Found</h2>
        <p class="lead mb-4">Sorry, the page you're looking for doesn't exist.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go to Homepage</a>
    </div>
</div>
{% endblock %}
