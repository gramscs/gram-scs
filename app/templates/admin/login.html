<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login – Gram SCS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f9;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
    }

    .login-card .card-header {
      border-radius: 12px 12px 0 0;
      background: #1a2340;
      color: #fff;
      text-align: center;
      padding: 1.5rem 2rem 1rem;
    }

    .login-card .card-header img {
      height: 48px;
      margin-bottom: 0.6rem;
    }

    .btn-admin-login {
      background: #82CF2B;
      border-color: #82CF2B;
      color: #fff;
      font-weight: 600;
    }

    .btn-admin-login:hover {
      background: #6ab522;
      border-color: #6ab522;
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="login-card card">
    <div class="card-header">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Gram SCS Logo" />
      <h5 class="mb-0 mt-1">Admin Login</h5>
      <small class="text-white-50">Gram SCS IT Department</small>
    </div>
    <div class="card-body p-4">
      {% if error %}
      <div class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('admin.login') }}" autocomplete="off" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            required
            autofocus
            autocomplete="username"
            placeholder="Enter username"
          />
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="Enter password"
          />
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-admin-login">Sign In</button>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
