<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Admin – Gram SCS{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/font-awesome.min.css') }}" />
  <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" />
  <style>
    body {
      min-height: 100vh;
      background: #f4f6f9;
    }

    .sidebar {
      min-height: 100vh;
      background: #1a2340;
      color: #fff;
      width: 240px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      padding-top: 1.5rem;
    }

    .sidebar .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar .brand img {
      height: 36px;
    }

    .sidebar .nav-link {
      color: rgba(255, 255, 255, 0.75);
      padding: 0.65rem 1.25rem;
      border-radius: 6px;
      margin: 0.1rem 0.5rem;
      transition: background 0.15s;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: rgba(130, 207, 43, 0.18);
      color: #82CF2B;
    }

    .sidebar .nav-link i {
      width: 20px;
      text-align: center;
      margin-right: 0.5rem;
    }

    .sidebar .nav .submenu {
      padding-left: 0.75rem;
    }

    .sidebar .nav .submenu .nav-link {
      margin-left: 0.9rem;
      font-size: 0.92rem;
      padding-top: 0.5rem;
      padding-bottom: 0.5rem;
    }

    .sidebar .dropdown-toggle::after {
      margin-left: auto;
    }

    .main-content {
      margin-left: 240px;
      padding: 2rem;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0.75rem 2rem;
      margin-left: 240px;
      position: sticky;
      top: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-card {
      border: none;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .stat-card .icon-box {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }
  </style>
  {% block head %}{% endblock %}
</head>

<body>
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="brand">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" />
      <span class="fw-bold fs-6">Gram SCS Admin</span>
    </div>
    <ul class="nav flex-column mt-3">
      <li class="nav-item">
        <a href="{{ url_for('admin.dashboard') }}"
           class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
          <i class="fa fa-tachometer"></i> Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('admin.xk7m2p') }}"
           class="nav-link {% if active_page == 'consignments' %}active{% endif %}">
          <i class="fa fa-truck"></i> Consignments
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('admin.xk7m2p_leads') }}"
           class="nav-link {% if active_page == 'leads' %}active{% endif %}">
          <i class="fa fa-users"></i> Leads
        </a>
      </li>
      <li class="nav-item">
        <a
          class="nav-link d-flex align-items-center dropdown-toggle {% if active_page == 'eta_master' %}active{% endif %}"
          data-bs-toggle="collapse"
          href="#etaMenu"
          role="button"
          aria-expanded="{% if active_page == 'eta_master' %}true{% else %}false{% endif %}"
          aria-controls="etaMenu"
        >
          <i class="fa fa-folder-open"></i> Master
        </a>
        <div class="collapse {% if active_page == 'eta_master' %}show{% endif %}" id="etaMenu">
          <ul class="nav flex-column submenu">
            <li class="nav-item">
              <a
                href="{{ url_for('eta_master.eta_master_upload') }}"
                class="nav-link {% if active_page == 'eta_master' %}active{% endif %}"
              >
                <i class="fa fa-clock-o"></i> ETA
              </a>
            </li>
          </ul>
        </div>
      </li>
      <li class="nav-item mt-3" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 0.75rem;">
        <a href="{{ url_for('admin.logout') }}" class="nav-link text-danger">
          <i class="fa fa-sign-out"></i> Logout
        </a>
      </li>
    </ul>
  </nav>

  <!-- Top bar -->
  <div class="topbar">
    <h6 class="mb-0 fw-semibold text-muted">{% block topbar_title %}Dashboard{% endblock %}</h6>
    <div class="d-flex align-items-center gap-2">
      <span class="badge bg-success">Admin</span>
      <a href="{{ url_for('admin.logout') }}" class="btn btn-sm btn-outline-danger">Logout</a>
    </div>
  </div>

  <!-- Main content -->
  <div class="main-content">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>

</html>
